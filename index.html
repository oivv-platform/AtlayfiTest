<!doctype html>
<html lang="en-US" style="width:100%;height:100%;background:#050505;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>Luxury UI Sandbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --glass: rgba(18, 18, 18, 0.65); 
            --border: rgba(255, 255, 255, 0.12); 
            --blur: blur(30px) saturate(150%); 
            --accent: #fff; 
            --text-muted: rgba(255,255,255,0.45);
        }
        
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Montserrat', sans-serif; color: white; -webkit-font-smoothing: antialiased; }
        
        #fake-ue5-bg { position: absolute; inset: 0; background: radial-gradient(circle at center, #222 0%, #050505 100%); z-index: -1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.05); font-size: 24px; letter-spacing: 10px; }

        /* --- THE UNIVERSAL PANEL DESIGN --- */
        .panel { 
            position: absolute; bottom: 105px; left: 50%; 
            transform: translate3d(-50%, 30px, 0) scale(0.95); 
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); 
            border: 1px solid var(--border); border-radius: 28px; 
            padding: 20px;
            width: calc(100% - 40px); max-width: 380px;
            opacity: 0; visibility: hidden; pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), 
                        opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        visibility 0.5s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            will-change: transform, opacity;
        }

        .panel.active { 
            opacity: 1; visibility: visible; pointer-events: auto;
            transform: translate3d(-50%, 0, 0) scale(1); 
        }
        
        .header-title { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        
        .header-controls { display: flex; gap: 8px; align-items: center; }

        .icon-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; font-size: 12px; color: #fff; cursor: pointer; transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); flex-shrink: 0; }
        .icon-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .icon-btn.active { background: #fff; color: #000; border-color: #fff; }
        .icon-btn.done { background: rgba(50, 200, 100, 0.1); border-color: rgba(50, 200, 100, 0.3); color: #4ade80; }
        .icon-btn.done:hover { background: #4ade80; color: #000; }

        /* --- COMPACT GRID --- */
        .body-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px 15px; 
            margin-bottom: 5px;
        }

        .slider-group { width: 100%; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .label-text { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #eee; }
        .val-text { font-size: 9px; color: var(--text-muted); font-weight: 600; }

        .slider-row { display: flex; align-items: center; gap: 10px; }
        .icon-slot { 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            flex-shrink: 0; 
        }
        .icon-slot svg { width: 100%; height: 100%; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; }
        input[type=range]::-webkit-slider-thumb { height: 16px; width: 16px; border-radius: 50%; background: #fff; cursor: pointer; -webkit-appearance: none; margin-top: -7px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        /* --- SCROLLBOX WITH SHADOWS --- */
        .scroll-container { position: relative; margin-bottom: 5px; }
        .scroll-container::before, .scroll-container::after { content: ''; position: absolute; top: 0; bottom: 0; width: 30px; z-index: 2; pointer-events: none; }
        .scroll-container::before { left: 0; background: linear-gradient(to right, rgba(18,18,18,0.8), transparent); }
        .scroll-container::after { right: 0; background: linear-gradient(to left, rgba(18,18,18,0.8), transparent); }

        .h-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 5px 10px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .h-scroll::-webkit-scrollbar { display: none; }
        
        .face-card { width: 75px; height: 75px; border-radius: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); flex-shrink: 0; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; font-size: 9px; letter-spacing: 1px; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .face-card.selected { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.05); transform: scale(1.05); }

        /* --- APP NAVIGATION --- */
        #main-nav { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 320px; height: 60px; background: rgba(15, 15, 15, 0.85); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: 100px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .nav-item { color: rgba(255,255,255,0.3); font-size: 10px; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.3s; padding: 10px 20px; border-radius: 30px; }
        .nav-item.active { color: #fff; font-weight: 600; background: rgba(255,255,255,0.08); }
    </style>
</head>

        </div>

    <div id="panel-body-refine" class="panel">
        <div class="header-title">
            <button class="icon-btn" style="width: 28px; height: 28px;" onclick="navTo('panel-body')">←</button>
            <span>Refinement</span>
            <button class="icon-btn done" onclick="closeAll()" title="Done">✓</button>
        </div>
        <div class="h-scroll" style="padding-bottom: 15px;">
            <div class="category-tab active">Neck</div><div class="category-tab">Shoulders</div><div class="category-tab">Arms</div><div class="category-tab">Torso</div><div class="category-tab">Legs</div>
        </div>
        <div class="slider-group" style="margin-bottom: 15px;">
            <div class="label-row"><div class="label-text">Length</div><div class="val-text">50</div></div>
            <input type="range" min="0" max="100" value="50">
        </div>
        <div class="slider-group" style="margin-bottom: 15px;">
            <div class="label-row"><div class="label-text">Thickness</div><div class="val-text">50</div></div>
            <input type="range" min="0" max="100" value="50">
        </div>
    </div>

    <div id="panel-wardrobe" class="panel">
        <div class="header-title">Collection 2026<button class="icon-btn done" onclick="closeAll()">✓</button></div>
        <div class="item-row" onclick="navTo('panel-cloth-actions')">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="icon-slot" style="margin: 0; width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px;">IMG</div>
                <span class="item-title">Leather Bomber</span>
            </div>
            <span>➔</span>
        </div>
    </div>

    <nav id="main-nav">
        <div class="nav-item active" id="nav-avatar" onclick="toggleNav('avatar', 'panel-face')">Avatar</div>
        <div class="nav-item" id="nav-wardrobe" onclick="toggleNav('wardrobe', 'panel-wardrobe')">Wardrobe</div>
    </nav>

    <script>
        function toggleNav(navType, targetPanelId) {
            const navBtn = document.getElementById('nav-' + navType);
            if (navBtn.classList.contains('active')) {
                closeAll();
            } else {
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
                navBtn.classList.add('active');
                navTo(targetPanelId);
            }
        }

        function closeAll() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            setTimeout(() => {
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            }, 300);
        }

        function navTo(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(panelId);
            if(target) target.classList.add('active');
        }

        document.querySelectorAll('.face-card').forEach(el => {
            el.addEventListener('click', (e) => {
                e.target.closest('.h-scroll').querySelectorAll('.face-card').forEach(c => c.classList.remove('selected'));
                e.target.classList.add('selected');
            });
        });

        document.querySelectorAll('input[type=range]').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const span = e.target.closest('.slider-group').querySelector('.val-text');
                if(span) span.innerText = e.target.value;
            });
        });
    </script>
